<div class="container-fluid py-4 px-3 px-md-4">
  <div class="row justify-content-center">
    <div class="col-12 col-sm-10 col-md-8 col-lg-6">

      <!-- Profile Card -->
      <div class="card shadow-sm border-0 rounded-4">

        <!-- Header -->
        <div
          class="card-header bg-primary text-white rounded-top-4 d-flex flex-sm-row align-items-center gap-3"
        >
        <div class="profile-container">
            <mat-icon class="profile-icon">
                account_circle
            </mat-icon>
        </div>

          <div class="text-center text-sm-start">
            <h5 class="mb-0">{{ user.name }}</h5>
            <small class="opacity-75">{{ user.role }}</small>
          </div>
        </div>

        <!-- Body -->
        <div class="card-body p-3 p-sm-4">

          <!-- User Details -->
          <div class="row mb-3">
            <div class="col-12 col-sm-4 fw-semibold">Email</div>
            <div class="col-12 col-sm-8 text-break">
              {{ user.email }}
            </div>
          </div>

          <div class="row mb-3">
            <div class="col-12 col-sm-4 fw-semibold">Phone</div>
            <div class="col-12 col-sm-8">
              {{ user.phone }}
            </div>
          </div>

          <div class="row mb-3">
            <div class="col-12 col-sm-4 fw-semibold">Role</div>
            <div class="col-12 col-sm-8">
              {{ user.role }}
            </div>
          </div>

          <hr />
            <!-- Actions -->
            <div class="d-flex flex-column flex-sm-row gap-2 justify-content-end">
              <button
                type="button"
                class="btn btn-outline-secondary px-4 w-100 w-sm-auto"
                routerLink="/profile"
              >
                Cancel
              </button>

              <button
                type="button"
                class="btn btn-danger px-4 w-100 w-sm-auto"
                (click)="onDelete()"
              >
                Delete
              </button>
            </div>


        </div>
      </div>

    </div>
  </div>
</div>
