<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-head">
      <div class="logo"><i class="ti ti-shield-lock"></i></div>
      <h1>Reset your password</h1>
      <p>Enter your registered email and a new password to recover your account.</p>
    </div>

    <div *ngIf="success" class="success-bar"><i class="ti ti-circle-check"></i>{{ success }}</div>
    <div *ngIf="error" class="error-bar"><i class="ti ti-alert-circle"></i>{{ error }}</div>

    <form [formGroup]="form" (ngSubmit)="submit()" class="auth-form">
      <div class="field">
        <label>Email *</label>
        <input class="form-control" type="email" formControlName="email" placeholder="you@example.com" />
        <small class="hint-err" *ngIf="form.get('email')?.touched && form.get('email')?.invalid">Enter a valid email.</small>
      </div>

      <div class="field">
        <label>New Password *</label>
        <div class="input-with-icon">
          <input class="form-control" [type]="showPass ? 'text' : 'password'" formControlName="newPassword" placeholder="Minimum 8 characters" />
          <button type="button" class="eye-btn" (click)="showPass = !showPass" aria-label="Toggle password">
            <i class="ti" [class.ti-eye]="!showPass" [class.ti-eye-off]="showPass"></i>
          </button>
        </div>
        <small class="hint-err" *ngIf="form.get('newPassword')?.touched && form.get('newPassword')?.invalid">
          Must be 8+ chars with uppercase, lowercase, digit and special char (&#64;$!%*?&).
        </small>
      </div>

      <div class="field">
        <label>Confirm Password *</label>
        <div class="input-with-icon">
          <input class="form-control" [type]="showConfirm ? 'text' : 'password'" formControlName="confirmPassword" placeholder="Re-type new password" />
          <button type="button" class="eye-btn" (click)="showConfirm = !showConfirm" aria-label="Toggle password">
            <i class="ti" [class.ti-eye]="!showConfirm" [class.ti-eye-off]="showConfirm"></i>
          </button>
        </div>
        <small class="hint-err" *ngIf="form.errors?.['mismatch'] && form.get('confirmPassword')?.touched">Passwords do not match.</small>
      </div>

      <button class="btn-primary" type="submit" [disabled]="isSubmitting">
        <span *ngIf="isSubmitting" class="spinner"></span>
        <i *ngIf="!isSubmitting" class="ti ti-lock-check"></i>
        {{ isSubmitting ? 'Resetting...' : 'Reset Password' }}
      </button>

      <div class="auth-foot">
        <a routerLink="/login"><i class="ti ti-arrow-left"></i> Back to login</a>
      </div>
    </form>
  </div>
</div>
