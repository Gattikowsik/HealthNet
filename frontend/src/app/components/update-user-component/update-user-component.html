<div class="container-fluid py-4 px-3 px-md-4">
  <div class="row justify-content-center">
    <div class="col-12 col-sm-10 col-md-8 col-lg-6">

      <div class="card shadow-sm border-0 rounded-4">
        <div class="py-4 card-header bg-primary text-white rounded-top-4">
          <h4 class="mb-0 text-center">Update Profile</h4>
        </div>

        <div class="card-body p-3 p-sm-4">

          <form (ngSubmit)="onUpdate()" #updateForm="ngForm">

            <!-- Name -->
            <div class="mb-3">
              <label class="form-label fw-semibold">Full Name</label>
              <input
                type="text"
                class="form-control form-control-lg"
                placeholder="Enter full name"
                [(ngModel)]="user.Name"
                name="name"
                required
              />
            </div>

            <!-- Email -->
            <div class="mb-3">
              <label class="form-label fw-semibold">Email Address</label>
              <input
                type="email"
                class="form-control form-control-lg"
                placeholder="Enter email"
                [(ngModel)]="user.Email"
                name="email"
                required
              />
            </div>

            <!-- Phone -->
            <div class="mb-3">
              <label class="form-label fw-semibold">Phone Number</label>
              <input
                type="text"
                class="form-control form-control-lg"
                placeholder="+91 9876543210"
                [(ngModel)]="user.PhoneNumber"
                name="phoneNumber"
                required
              />
            </div>

            <!-- Role Dropdown -->
            <div class="mb-4">
              <label class="form-label fw-semibold">Role</label>
              <select
                class="form-select form-select-lg"
                [(ngModel)]="user.RoleName"
                name="role"
                required
              >
                <option value="Citizen">Citizen</option>
                <option value="Doctor">Doctor</option>
                <option value="Lab Technician">Lab Technician</option>
                <option value="Compliance Officer">Compliance Officer</option>
                <option value="Researcher">Researcher</option>
                <option value="Public Health Officer">Public Health Officer</option>
                <option value="Admin">Admin</option>
              </select>
            </div>

            <!-- Actions -->
            <div class="d-flex flex-column flex-sm-row gap-2 justify-content-end">
              <button
                type="button"
                class="btn btn-outline-secondary px-4 w-100 w-sm-auto"
                routerLink="/profile"
              >
                Cancel
              </button>

              <button
                type="submit"
                class="btn btn-primary px-4 w-100 w-sm-auto"
                [disabled]="updateForm.invalid"
              >
                Update
              </button>
            </div>

          </form>

        </div>
      </div>

    </div>
  </div>
</div>
